{% extends 'app/base.html' %}

{% block title %}Query Result - ContextIQ{% endblock %}

{% block content %}
<h2>Query Results</h2>

<div style="background-color: #e9ecef; padding: 1rem; border-radius: 4px; margin-bottom: 1rem;">
    <strong>Your Question:</strong>
    <p>{{ query }}</p>
</div>

<div style="background-color: #fcfcfc; border: 1px solid #ccc; padding: 1rem; border-radius: 4px;">
    <strong>Answer:</strong>
    <p>{{ response|linebreaks }}</p>
</div>

<br>
<a href="{% url 'app:dashboard' %}"
    style="display:inline-block; margin-top: 1rem; padding: 0.5rem 1rem; background: #007bff; color: white; text-decoration: none; border-radius: 4px;">←
    Back to Dashboard</a>
{% endblock %}
