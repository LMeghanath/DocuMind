<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ContextIQ{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        header {
            background-color: #0056b3;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a {
            margin-left: 1rem;
            color: #e0e0e0;
            text-decoration: none;
        }

        nav a:hover {
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #0056b3;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #004494;
        }

        .error {
            color: red;
            font-size: 0.9em;
            margin-top: 0.5rem;
        }

        .success {
            color: green;
        }

        .logout-btn {
            background: none;
            border: none;
            font: inherit;
            cursor: pointer;
            text-decoration: underline;
            color: #e0e0e0;
        }

        .logout-btn:hover {
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <div><a href="{% url 'app:dashboard' %}">ContextIQ</a></div>
        <nav>
            {% if user.is_authenticated %}
            <span>Welcome, {{ user.username }}!</span>
            <form action="{% url 'app:logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'app:login' %}">Login</a>
            <a href="{% url 'app:register' %}">Register</a>
            {% endif %}
        </nav>
    </header>

    <div class="container">
        {% if messages %}
        <ul style="list-style-type: none; padding: 0; margin-bottom: 1rem;">
            {% for message in messages %}
            <li
                style="padding: 0.5rem; margin-bottom: 0.5rem; border-radius: 4px; {% if message.tags == 'error' %}background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;{% else %}background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;{% endif %}">
                {{ message }}
            </li>
            {% endfor %}
        </ul>
        {% endif %}

        {% block content %}
        {% endblock content %}
    </div>

</body>

</html>
