{% extends 'app/base.html' %}

{% block title %}Upload Document - ContextIQ{% endblock %}

{% block content %}
<h2>Upload Document</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-group">
        <label for="{{ form.file.id_for_label }}">Select File (.pdf, .txt)</label>
        {{ form.file }}
        {% if form.file.errors %}
        <div class="error">
            {% for error in form.file.errors %}
            <p>{{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>
    <button type="submit">Upload</button>
</form>
<br>
<a href="{% url 'app:dashboard' %}">← Back to Dashboard</a>
{% endblock %}
